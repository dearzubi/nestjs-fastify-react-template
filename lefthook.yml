pre-commit:
  parallel: true
  commands:
    biome:
      run: pnpm exec biome check --staged --no-errors-on-unmatched --files-ignore-unknown=true

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-push:
  parallel: true
  commands:
    typecheck:
      run: pnpm typecheck
    test:
      run: pnpm test

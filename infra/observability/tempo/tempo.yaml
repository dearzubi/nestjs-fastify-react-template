server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 72h

metrics_generator:
  processor:
    local_blocks:
      filter_server_spans: false
  traces_storage:
    path: /data/tempo/generator/traces
  storage:
    path: /data/tempo/generator/wal

overrides:
  defaults:
    ingestion:
      rate_limit_bytes: 1048576
      burst_size_bytes: 2097152
    metrics_generator:
      processors: [local-blocks]

storage:
  trace:
    backend: local
    wal:
      path: /data/tempo/wal
    local:
      path: /data/tempo/blocks
